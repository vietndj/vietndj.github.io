<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool: URL Slug Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F5F5F7; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; color: #1D1D1F; }
        .apple-card { background: #FFFFFF; border-radius: 18px; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05); border: 1px solid rgba(0, 0, 0, 0.04); padding: 24px;}
        .log-box { background: #1D1D1F; color: #34C759; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; height: 400px; overflow-y: auto; padding: 16px; border-radius: 12px; }
        .log-error { color: #FF3B30; }
        .log-warn { color: #FF9500; }
        .log-info { color: #5AC8FA; }
    </style>
</head>
<body class="p-8 max-w-4xl mx-auto">

    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold mb-2">Trình Tối Ưu Hóa URL (Auto Slugify)</h1>
        <p class="text-gray-500 text-sm">Quét và đổi tên các file HTML cũ sang chuẩn Slug (tiếng Việt không dấu), bảo tồn tiêu đề gốc.</p>
    </header>

    <div class="apple-card mb-6 flex flex-col md:flex-row gap-4 items-end">
        <div class="w-full md:w-1/3">
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Mã Token GitHub</label>
            <input type="password" id="gh-token" class="w-full bg-gray-100 px-4 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="ghp_...">
        </div>
        <div class="w-full md:w-1/3">
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tên tài khoản (User)</label>
            <input type="text" id="gh-user" value="vietndj" class="w-full bg-gray-100 px-4 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="w-full md:w-1/3 flex gap-2">
            <button onclick="loadRepos()" class="bg-gray-200 text-gray-800 px-4 py-2.5 rounded-xl font-bold hover:bg-gray-300 w-full transition">1. Tải Repos</button>
        </div>
    </div>

    <div id="action-area" class="apple-card mb-6 hidden">
        <div class="flex flex-col md:flex-row gap-4 items-end">
            <div class="w-full md:w-2/3">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Chọn Repo để quét</label>
                <select id="repo-select" class="w-full bg-gray-100 px-4 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer appearance-none">
                    </select>
            </div>
            <div class="w-full md:w-1/3">
                <button onclick="startScanAndFix()" id="btn-start" class="bg-blue-500 text-white px-4 py-2.5 rounded-xl font-bold hover:bg-blue-600 w-full transition flex justify-center items-center gap-2">
                    2. Bắt đầu Quét & Sửa
                </button>
            </div>
        </div>
        <p class="text-xs text-gray-400 mt-3">⚠️ Lưu ý: Quá trình này sẽ gọi API khá nhiều. Vui lòng không đóng trang web khi đang chạy.</p>
    </div>

    <div class="apple-card">
        <h3 class="text-sm font-bold mb-3 flex items-center gap-2">📺 Terminal Log</h3>
        <div id="log-container" class="log-box">
            <div>Chờ thao tác...</div>
        </div>
    </div>

    <script>
        const logBox = document.getElementById('log-container');
        function log(msg, type = '') {
            const p = document.createElement('div');
            p.className = `mb-1 ${type}`;
            p.innerText = `> ${msg}`;
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function slugify(text) {
            return text.toString().toLowerCase()
                .replace(/á|à|ả|ạ|ã|ă|ắ|ằ|ẳ|ẵ|ặ|â|ấ|ầ|ẩ|ẫ|ậ/gi, 'a')
                .replace(/é|è|ẻ|ẽ|ẹ|ê|ế|ề|ể|ễ|ệ/gi, 'e')
                .replace(/i|í|ì|ỉ|ĩ|ị/gi, 'i')
                .replace(/ó|ò|ỏ|õ|ọ|ô|ố|ồ|ổ|ỗ|ộ|ơ|ớ|ờ|ở|ỡ|ợ/gi, 'o')
                .replace(/ú|ù|ủ|ũ|ụ|ư|ứ|ừ|ử|ữ|ự/gi, 'u')
                .replace(/ý|ỳ|ỷ|ỹ|ỵ/gi, 'y')
                .replace(/đ/gi, 'd')
                .replace(/\s+/g, '-')           
                .replace(/[^\w\-]+/g, '')       
                .replace(/\-\-+/g, '-')         
                .replace(/^-+/, '')             
                .replace(/-+$/, '');            
        }

        async function api(path, method = 'GET', body = null) {
            // VẮT SẠCH khoảng trắng, dấu \n vô tình bị copy dính vào Token
            const token = document.getElementById('gh-token').value.replace(/\s+/g, '');
            
            const headers = { 'Accept': 'application/vnd.github.v3+json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            if (body) headers['Content-Type'] = 'application/json';

            const opts = { method, headers };
            if(body) opts.body = JSON.stringify(body);
            
            const res = await fetch(`https://api.github.com${path}`, opts);
            
            if(!res.ok) { 
                let errMsg = 'Lỗi API không xác định';
                try { 
                    const err = await res.json(); 
                    errMsg = err.message || errMsg; 
                } catch(e) {} 
                throw new Error(errMsg); 
            }
            return await res.json();
        }

        let repoList = [];

        async function loadRepos() {
            const token = document.getElementById('gh-token').value.trim();
            const user = document.getElementById('gh-user').value.trim();
            if(!token || !user) return alert("Nhập Token và Username!");
            
            log(`Đang tải danh sách Repos của [${user}]...`, 'log-info');
            try {
                repoList = await api(`/users/${user}/repos?per_page=100`);
                const select = document.getElementById('repo-select');
                select.innerHTML = '<option value="ALL">-- Quét TẤT CẢ các Repos --</option>';
                repoList.forEach(r => {
                    select.innerHTML += `<option value="${r.name}">${r.name}</option>`;
                });
                document.getElementById('action-area').classList.remove('hidden');
                log(`Đã tải ${repoList.length} Repos. Sẵn sàng!`);
            } catch(e) {
                log(`Lỗi: ${e.message}`, 'log-error');
            }
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function startScanAndFix() {
            const user = document.getElementById('gh-user').value.trim();
            const selectedRepo = document.getElementById('repo-select').value;
            const btn = document.getElementById('btn-start');
            
            btn.disabled = true; btn.innerText = "⏳ Đang xử lý...";
            log(`\n=== BẮT ĐẦU CHẠY ===`, 'log-info');

            let reposToScan = selectedRepo === 'ALL' ? repoList.map(r => r.name) : [selectedRepo];

            try {
                let metadata = { _version: 5, tags: {}, links: {}, tasks: [], pinned: [], colors: {}, customColors: [], titles: {} };
                let metaSha = null;
                try {
                    const metaRes = await api(`/repos/${user}/${user}.github.io/contents/metadata.json`);
                    metaSha = metaRes.sha;
                    const parsed = JSON.parse(decodeURIComponent(escape(atob(metaRes.content))));
                    if(parsed._version) metadata = { ...metadata, ...parsed };
                } catch(e) { log("Không tìm thấy metadata.json hoặc lỗi đọc, sẽ tạo mới.", "log-warn"); }

                let totalFixed = 0;

                for (const rName of reposToScan) {
                    log(`\n📁 Đang quét kho: ${rName}...`, 'log-info');
                    let files = [];
                    try { files = await api(`/repos/${user}/${rName}/contents/`); } 
                    catch(e) { log(`Bỏ qua ${rName} (Rỗng hoặc lỗi)`, 'log-warn'); continue; }

                    const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');
                    
                    for (const file of htmlFiles) {
                        const oldName = file.name;
                        const rawTitle = oldName.replace('.html', '');
                        let newSlug = slugify(rawTitle);
                        
                        let oldKey = `${rName === user + '.github.io' ? rName : rName}/${oldName}`;
                        let fileTags = metadata.tags[oldKey];
                        if (fileTags && Array.isArray(fileTags) && fileTags.length > 0) {
                            let tagSlug = slugify(fileTags.join('-'));
                            if (!newSlug.includes(tagSlug)) newSlug += '-' + tagSlug;
                        }
                        
                        const newName = newSlug + '.html';

                        if (oldName !== newName) {
                            log(`⚠️ Phát hiện file cần sửa: [${oldName}]`);
                            
                            try {
                                log(`   - Đọc nội dung...`);
                                const oldFileData = await api(`/repos/${user}/${rName}/contents/${encodeURIComponent(oldName)}`);
                                
                                log(`   - Đổi thành: [${newName}]...`);
                                await api(`/repos/${user}/${rName}/contents/${encodeURIComponent(newName)}`, 'PUT', {
                                    message: `Auto-Slugify: Đổi tên từ ${oldName}`,
                                    content: oldFileData.content
                                });

                                log(`   - Xóa file cũ...`);
                                await api(`/repos/${user}/${rName}/contents/${encodeURIComponent(oldName)}`, 'DELETE', {
                                    message: `Auto-Slugify: Xóa file cũ`,
                                    sha: oldFileData.sha
                                });

                                log(`   - Chuyển đổi Metadata...`);
                                const newKey = `${rName === user + '.github.io' ? rName : rName}/${newName}`;
                                
                                if(metadata.tags[oldKey]) { metadata.tags[newKey] = metadata.tags[oldKey]; delete metadata.tags[oldKey]; }
                                if(metadata.links[oldKey]) { metadata.links[newKey] = metadata.links[oldKey]; delete metadata.links[oldKey]; }
                                if(metadata.colors[oldKey]) { metadata.colors[newKey] = metadata.colors[oldKey]; delete metadata.colors[oldKey]; }
                                if(metadata.titles[oldKey]) { 
                                    metadata.titles[newKey] = metadata.titles[oldKey]; delete metadata.titles[oldKey]; 
                                } else {
                                    metadata.titles[newKey] = rawTitle;
                                }
                                
                                if(metadata.pinned.includes(oldKey)) {
                                    metadata.pinned = metadata.pinned.filter(k => k !== oldKey);
                                    metadata.pinned.push(newKey);
                                }

                                totalFixed++;
                                log(`   ✅ Hoàn tất đổi file.`);
                                await delay(1500); 
                                
                            } catch(fileErr) {
                                log(`   ❌ Lỗi khi sửa file [${oldName}]: ${fileErr.message}`, 'log-error');
                            }
                        }
                    }
                }

                if (totalFixed > 0) {
                    log(`\n💾 Đang lưu Metadata mới lên GitHub...`, 'log-info');
                    const metaBody = {
                        message: `Auto-Slugify: Cập nhật cấu trúc Metadata`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(metadata, null, 2))))
                    };
                    if (metaSha) metaBody.sha = metaSha;
                    await api(`/repos/${user}/${user}.github.io/contents/metadata.json`, 'PUT', metaBody);
                    log(`✅ Lưu Metadata thành công!`);
                } else {
                    log(`\n🎉 Không có file nào cần tối ưu. Mọi thứ đã chuẩn!`, 'log-info');
                }

                log(`\n=== KẾT THÚC. ĐÃ SỬA ${totalFixed} BÀI VIẾT ===`, 'log-info');

            } catch(e) {
                log(`Lỗi hệ thống: ${e.message}`, 'log-error');
            } finally {
                btn.disabled = false; btn.innerText = "2. Bắt đầu Quét & Sửa";
            }
        }
    </script>
</body>
</html>
