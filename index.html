<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vietndj - Super Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 p-4 md:p-8">

    <header class="max-w-7xl mx-auto text-center mb-8 bg-indigo-700 text-white p-6 rounded-2xl shadow-xl border-b-4 border-indigo-900">
        <h1 class="text-3xl md:text-4xl font-extrabold mb-2 uppercase tracking-tight">🚀 vietndj Super Command Center</h1>
        <p class="text-indigo-200">Hệ quản trị thời gian thực cho Kho bài viết AI</p>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">

        <div class="lg:col-span-7 flex flex-col gap-6">
            <section class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
                <div class="flex flex-col sm:flex-row justify-between items-center border-b pb-4 mb-4 gap-4">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <span>📂</span> Hệ Thống Kho (Repos)
                    </h2>
                    <div class="flex gap-2 bg-gray-100 p-1 rounded-lg">
                        <button onclick="changeSortOrder('desc')" id="sort-desc" class="px-3 py-1.5 rounded-md text-sm font-bold bg-indigo-600 text-white shadow">Mới nhất ↓</button>
                        <button onclick="changeSortOrder('asc')" id="sort-asc" class="px-3 py-1.5 rounded-md text-sm font-bold text-gray-600 hover:bg-gray-200 transition">Cũ nhất ↑</button>
                        <button onclick="loadRepos()" class="ml-2 px-3 py-1.5 bg-white border border-gray-300 rounded-md text-sm hover:bg-gray-50 transition">🔄</button>
                    </div>
                </div>
                <div id="repo-container" class="flex flex-col gap-6">
                    <p class="text-center text-gray-500 italic animate-pulse">⏳ Đang kết nối GitHub...</p>
                </div>
            </section>
        </div>

        <div class="lg:col-span-5">
            <section class="bg-white p-6 rounded-xl shadow-lg border border-gray-200 border-t-4 border-t-green-500 sticky top-6">
                <h2 class="text-xl font-bold text-gray-800 border-b pb-3 mb-4 flex items-center gap-2">
                    <span>⚡</span> Tạo File HTML Ngay
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">🔑 GITHUB TOKEN (Đã mã hóa tại trình duyệt)</label>
                        <input type="password" id="github-token" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-green-500 text-sm bg-gray-50">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">CHỌN KHO</label>
                            <input type="text" id="upload-repo" value="vietndj/" class="w-full px-3 py-2 border rounded font-bold text-indigo-700 bg-gray-50">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">TÊN FILE (.html)</label>
                            <input type="text" id="upload-filename" placeholder="ten-bai.html" class="w-full px-3 py-2 border rounded font-semibold focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">MÃ NGUỒN (HTML Code)</label>
                        <textarea id="upload-content" rows="8" class="w-full px-3 py-2 border rounded font-mono text-xs bg-gray-900 text-green-400 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="<html>...</html>"></textarea>
                    </div>
                    <button onclick="createFile()" id="btn-create" class="w-full bg-green-600 hover:bg-green-700 text-white font-extrabold py-4 rounded-xl transition-all shadow-lg transform active:scale-95">
                        PUSH LÊN GITHUB
                    </button>
                    <p id="upload-status" class="text-sm text-center font-bold p-2 rounded-lg hidden"></p>
                </div>
            </section>
        </div>
    </main>

    <script>
        const username = 'vietndj';
        let sortOrder = 'desc'; // 'desc' = mới nhất, 'asc' = cũ nhất
        let repoDataCache = {}; // Lưu trữ dữ liệu để sắp xếp nhanh

        const savedToken = localStorage.getItem('github_pat');
        if(savedToken) document.getElementById('github-token').value = savedToken;

        function getHeaders() {
            const t = document.getElementById('github-token').value.trim() || savedToken;
            return t ? { 'Authorization': `Bearer ${t}`, 'Accept': 'application/vnd.github.v3+json' } : {};
        }

        // Chuyển đổi thứ tự sắp xếp
        function changeSortOrder(order) {
            sortOrder = order;
            document.getElementById('sort-desc').className = order === 'desc' ? 'px-3 py-1.5 rounded-md text-sm font-bold bg-indigo-600 text-white shadow' : 'px-3 py-1.5 rounded-md text-sm font-bold text-gray-600 hover:bg-gray-200 transition';
            document.getElementById('sort-asc').className = order === 'asc' ? 'px-3 py-1.5 rounded-md text-sm font-bold bg-indigo-600 text-white shadow' : 'px-3 py-1.5 rounded-md text-sm font-bold text-gray-600 hover:bg-gray-200 transition';
            renderRepos(); // Vẽ lại giao diện từ cache
        }

        async function loadRepos() {
            const container = document.getElementById('repo-container');
            container.innerHTML = '<p class="text-center text-gray-500 italic animate-pulse py-10 text-lg">🚀 Đang quét dữ liệu thời gian thực...</p>';

            try {
                const resRepos = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`, { headers: getHeaders() });
                const repos = await resRepos.json();
                
                if (repos.message) throw new Error(repos.message);

                for (const repo of repos) {
                    if (repo.name === `${username}.github.io`) continue;
                    
                    const resFiles = await fetch(`https://api.github.com/repos/${username}/${repo.name}/contents/`, { headers: getHeaders() });
                    const files = await resFiles.json();
                    
                    if (Array.isArray(files)) {
                        const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');
                        
                        const fileDetails = await Promise.all(htmlFiles.map(async file => {
                            const resCommit = await fetch(`https://api.github.com/repos/${username}/${repo.name}/commits?path=${file.path}&per_page=1`, { headers: getHeaders() });
                            const commitData = await resCommit.json();
                            const dateObj = new Date(commitData[0].commit.committer.date);
                            
                            return {
                                name: decodeURIComponent(file.name.replace('.html', '')),
                                fileName: file.name,
                                url: `https://${username}.github.io/${repo.name}/${file.name}`,
                                timestamp: dateObj.getTime(),
                                fullDate: dateObj.toLocaleString('vi-VN', { 
                                    hour: '2-digit', 
                                    minute: '2-digit', 
                                    day: '2-digit', 
                                    month: '2-digit', 
                                    year: 'numeric' 
                                })
                            };
                        }));
                        repoDataCache[repo.name] = fileDetails;
                    }
                }
                renderRepos();
            } catch(e) {
                container.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-lg font-bold text-center">❌ Lỗi: ${e.message}</div>`;
            }
        }

        function renderRepos() {
            const container = document.getElementById('repo-container');
            container.innerHTML = '';

            Object.keys(repoDataCache).forEach(repoName => {
                const files = [...repoDataCache[repoName]];
                // Sắp xếp theo timestamp
                files.sort((a, b) => sortOrder === 'desc' ? b.timestamp - a.timestamp : a.timestamp - b.timestamp);

                const card = document.createElement('div');
                card.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition";
                card.innerHTML = `
                    <div class="bg-indigo-50 px-4 py-3 flex justify-between items-center border-b border-indigo-100">
                        <h3 class="font-black text-indigo-800 uppercase text-sm tracking-wider cursor-pointer" onclick="document.getElementById('upload-repo').value='${username}/${repoName}'">📂 ${repoName}</h3>
                        <div class="flex gap-2">
                            <a href="https://github.dev/${username}/${repoName}" target="_blank" class="p-1 hover:bg-white rounded transition" title="VS Code Web">💻</a>
                        </div>
                    </div>
                    <ul class="p-2 divide-y divide-gray-100">
                        ${files.length === 0 ? '<li class="text-xs text-gray-400 p-2 italic text-center">Trống</li>' : ''}
                        ${files.map(f => `
                            <li class="flex flex-col sm:flex-row sm:items-center justify-between p-3 hover:bg-gray-50 transition gap-2">
                                <a href="${f.url}" target="_blank" class="font-bold text-gray-700 hover:text-indigo-600 truncate">📄 ${f.name}</a>
                                <span class="text-[10px] sm:text-xs font-mono font-bold text-gray-400 bg-gray-100 px-2 py-1 rounded border border-gray-200">🕒 ${f.fullDate}</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
                container.appendChild(card);
            });
        }

        loadRepos();

        async function createFile() {
            const token = document.getElementById('github-token').value.trim();
            const repoPath = document.getElementById('upload-repo').value.trim();
            let name = document.getElementById('upload-filename').value.trim();
            const content = document.getElementById('upload-content').value;
            const status = document.getElementById('upload-status');
            const btn = document.getElementById('btn-create');

            if(!token || !repoPath || !name || !content) { alert("Thiếu dữ liệu!"); return; }
            if(!name.endsWith('.html')) name += '.html';
            localStorage.setItem('github_pat', token);

            btn.innerText = "⏳ ĐANG PUSH..."; btn.disabled = true;
            status.className = "text-sm text-center font-bold p-2 rounded-lg bg-yellow-100 text-yellow-700 block animate-pulse";
            status.innerText = "Đang mã hóa & truyền dữ liệu...";

            try {
                const base64 = btoa(unescape(encodeURIComponent(content)));
                const response = await fetch(`https://api.github.com/repos/${repoPath}/contents/${name}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Cập nhật: ${name}`, content: base64 })
                });

                if(response.ok) {
                    status.className = "text-sm text-center font-bold p-2 rounded-lg bg-green-100 text-green-700 block";
                    status.innerText = `✅ Đã tạo file thành công!`;
                    // Cập nhật cache cục bộ để hiển thị ngay
                    const now = new Date();
                    const newFile = {
                        name: name.replace('.html', ''),
                        fileName: name,
                        url: `https://${repoPath.split('/')[0]}.github.io/${repoPath.split('/')[1]}/${name}`,
                        timestamp: now.getTime(),
                        fullDate: now.toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric' })
                    };
                    repoDataCache[repoPath.split('/')[1]].push(newFile);
                    renderRepos();
                    // Tự mở link sau 2s
                    setTimeout(() => window.open(newFile.url, '_blank'), 2000);
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message);
                }
            } catch (e) {
                status.className = "text-sm text-center font-bold p-2 rounded-lg bg-red-100 text-red-700 block";
                status.innerText = `❌ Lỗi: ${e.message}`;
            } finally {
                btn.innerText = "PUSH LÊN GITHUB"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
