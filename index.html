<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vietndj - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 p-4 md:p-8">

    <header class="max-w-7xl mx-auto text-center mb-8 bg-indigo-600 text-white p-6 rounded-2xl shadow-lg">
        <h1 class="text-3xl md:text-4xl font-extrabold mb-2">🚀 vietndj Command Center</h1>
        <p class="text-indigo-200">Trạm điều khiển Sinh thái GitHub Pages</p>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">

        <div class="lg:col-span-7 flex flex-col gap-6">
            <section class="bg-white p-6 rounded-xl shadow border border-gray-200">
                <div class="flex justify-between items-center border-b pb-3 mb-4">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <span>📂</span> Quản Lý Kho (Repositories)
                    </h2>
                    <button onclick="loadRepos()" class="text-sm text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-3 py-1 rounded transition">
                        🔄 Làm mới
                    </button>
                </div>
                <div id="repo-container" class="flex flex-col gap-4">
                    <p class="text-center text-gray-500 italic animate-pulse">⏳ Đang tải dữ liệu từ GitHub...</p>
                </div>
            </section>
        </div>

        <div class="lg:col-span-5 flex flex-col gap-6">
            
            <section class="bg-white p-6 rounded-xl shadow border border-gray-200 border-t-4 border-t-green-500 sticky top-6">
                <h2 class="text-xl font-bold text-gray-800 border-b pb-2 mb-4 flex items-center gap-2">
                    <span>⚡</span> Tạo File HTML Siêu Tốc
                </h2>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">🔑 GitHub Token (Đã lưu tự động)</label>
                        <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" 
                               class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-green-500 text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Tên Kho</label>
                            <input type="text" id="upload-repo" placeholder="vietndj/aiTool" value="vietndj/"
                                   class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-green-500 text-sm font-semibold text-indigo-700">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Tên File Mới</label>
                            <input type="text" id="upload-filename" placeholder="bai-moi.html" 
                                   class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-green-500 text-sm font-semibold">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Code HTML</label>
                        <textarea id="upload-content" rows="6" placeholder="Dán code HTML của bạn vào đây..." 
                                  class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-green-500 text-sm font-mono bg-gray-50"></textarea>
                    </div>
                    <button onclick="createFile()" id="btn-create" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors shadow-md">
                        🚀 Đẩy Lên GitHub Ngay
                    </button>
                    <p id="upload-status" class="text-sm text-center font-semibold mt-2 hidden"></p>
                </div>
            </section>

        </div>
    </main>

    <script>
        const username = 'vietndj';
        
        // Tự động điền token nếu đã lưu từ lần trước
        const savedToken = localStorage.getItem('github_pat');
        if(savedToken) document.getElementById('github-token').value = savedToken;

        // Hàm lấy Header chứa Token (Giúp tăng tốc và tránh bị chặn Limit)
        function getHeaders() {
            const t = document.getElementById('github-token').value.trim() || savedToken;
            return t ? { 'Authorization': `Bearer ${t}` } : {};
        }

        // --- 1. QUÉT KHO, TÌM NGÀY THÁNG VÀ SẮP XẾP ---
        async function loadRepos() {
            const container = document.getElementById('repo-container');
            container.innerHTML = '<p class="text-center text-gray-500 italic animate-pulse">⏳ Đang quét dữ liệu lịch sử...</p>';

            try {
                const resRepos = await fetch(`https://api.github.com/users/${username}/repos?sort=updated`, { headers: getHeaders() });
                const repos = await resRepos.json();

                if (repos.message && repos.message.includes("API rate limit")) {
                    container.innerHTML = '<p class="text-red-500 text-center font-bold">⚠️ Vượt quá giới hạn quét. Hãy nhập Token vào ô bên phải để mở khóa!</p>';
                    return;
                }

                container.innerHTML = ''; 

                for (const repo of repos) {
                    if (repo.name === `${username}.github.io`) continue;

                    const card = document.createElement('div');
                    card.className = "bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-sm";
                    card.innerHTML = `
                        <div class="flex flex-col md:flex-row md:items-center justify-between border-b border-gray-200 pb-2 mb-3 gap-2">
                            <h3 class="text-lg font-bold text-indigo-700 cursor-pointer hover:underline" onclick="document.getElementById('upload-repo').value='${username}/${repo.name}'">
                                📂 ${repo.name} <span class="text-xs text-gray-400 font-normal ml-1">(Bấm để chọn up file)</span>
                            </h3>
                            <div class="flex gap-2 text-xs font-medium">
                                <a href="https://${username}.github.io/${repo.name}/" target="_blank" class="bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg hover:bg-indigo-200 transition">🌐 Xem Web</a>
                                <a href="https://github.dev/${username}/${repo.name}" target="_blank" class="bg-gray-800 text-white px-3 py-1.5 rounded-lg hover:bg-gray-700 transition">💻 Mở VS Code</a>
                            </div>
                        </div>
                        <ul id="list-${username}-${repo.name}" class="flex flex-col pl-1 text-sm">
                            <li class="text-gray-400 italic text-xs py-1">⏳ Đang lấy ngày cập nhật...</li>
                        </ul>
                    `;
                    container.appendChild(card);

                    // Fetch file con
                    fetch(`https://api.github.com/repos/${username}/${repo.name}/contents/`, { headers: getHeaders() })
                        .then(r => r.json())
                        .then(async files => {
                            const list = document.getElementById(`list-${username}-${repo.name}`);
                            list.innerHTML = ''; 
                            if (!Array.isArray(files)) { list.innerHTML = '<li class="text-gray-400 text-xs empty-msg">Kho rỗng/Lỗi API</li>'; return; }
                            
                            const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');
                            if (htmlFiles.length === 0) { list.innerHTML = '<li class="text-gray-400 text-xs empty-msg">Chưa có bài viết .html</li>'; return; }

                            // Dùng Token để quét ngày cập nhật cuối cùng của từng file
                            const filePromises = htmlFiles.map(async file => {
                                let timestamp = 0;
                                let dateStr = "Chưa rõ";
                                try {
                                    const commitRes = await fetch(`https://api.github.com/repos/${username}/${repo.name}/commits?path=${file.path}&per_page=1`, { headers: getHeaders() });
                                    if(commitRes.ok) {
                                        const commitData = await commitRes.json();
                                        if(commitData.length > 0) {
                                            const dateISO = commitData[0].commit.committer.date;
                                            timestamp = new Date(dateISO).getTime();
                                            const d = new Date(dateISO);
                                            dateStr = d.toLocaleDateString('vi-VN'); // Hiển thị ngày/tháng/năm
                                        }
                                    }
                                } catch(e) {}
                                return { ...file, timestamp, dateStr };
                            });

                            // Đợi lấy xong toàn bộ ngày tháng rồi SẮP XẾP MỚI NHẤT LÊN ĐẦU
                            const filesWithDates = await Promise.all(filePromises);
                            filesWithDates.sort((a, b) => b.timestamp - a.timestamp);

                            filesWithDates.forEach(file => {
                                let name = decodeURIComponent(file.name.replace('.html', ''));
                                list.innerHTML += `
                                    <li class="flex justify-between items-center py-2 border-b border-gray-100 last:border-0 hover:bg-gray-100 rounded px-2 transition-colors group">
                                        <a href="https://${username}.github.io/${repo.name}/${file.name}" target="_blank" class="text-gray-700 font-medium group-hover:text-indigo-600 truncate max-w-[70%]">
                                            📄 ${name}
                                        </a>
                                        <span class="text-xs text-gray-500 bg-gray-200 px-2 py-0.5 rounded-full whitespace-nowrap">
                                            ✏️ ${file.dateStr}
                                        </span>
                                    </li>`;
                            });
                        });
                }
            } catch(e) {
                container.innerHTML = '<p class="text-red-500 text-center">Lỗi kết nối mạng.</p>';
            }
        }

        // Chạy ngay khi mở web
        loadRepos();

        // --- 2. LOGIC TẠO FILE TỰ ĐỘNG & HIỂN THỊ NGAY LẬP TỨC ---
        async function createFile() {
            const token = document.getElementById('github-token').value.trim();
            const repoFullName = document.getElementById('upload-repo').value.trim();
            let filename = document.getElementById('upload-filename').value.trim();
            const content = document.getElementById('upload-content').value;
            const statusEl = document.getElementById('upload-status');
            const btn = document.getElementById('btn-create');

            if(!token || !repoFullName || !filename || !content) {
                alert("Vui lòng điền đầy đủ các ô!"); return;
            }

            if(!filename.endsWith('.html')) filename += '.html';
            localStorage.setItem('github_pat', token); // Nhớ token

            btn.innerText = "⏳ Đang đẩy lên..."; btn.disabled = true;
            statusEl.classList.remove('hidden', 'text-green-600', 'text-red-600');
            statusEl.innerText = "Đang xử lý...";

            try {
                // Hỗ trợ tiếng Việt khi encode Base64
                const base64Content = btoa(unescape(encodeURIComponent(content)));

                const response = await fetch(`https://api.github.com/repos/${repoFullName}/contents/${filename}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Tạo bài: ${filename} qua Command Center`,
                        content: base64Content
                    })
                });

                const data = await response.json();

                if(response.ok) {
                    statusEl.innerText = `✅ Thành công! Đã lên sóng: ${filename}`;
                    statusEl.classList.add('text-green-600');
                    
                    // --- ĐIỂM SÁNG GIÁ: CẬP NHẬT GIAO DIỆN BÊN TRÁI NGAY LẬP TỨC ---
                    const repoNameOnly = repoFullName.split('/')[1];
                    const listEl = document.getElementById(`list-${username}-${repoNameOnly}`);
                    
                    if(listEl) {
                        // Xóa chữ "chưa có bài viết" nếu kho trống
                        const emptyMsg = listEl.querySelector('.empty-msg');
                        if(emptyMsg) emptyMsg.remove();

                        // Chèn file mới toanh lên đầu danh sách
                        const cleanName = decodeURIComponent(filename.replace('.html', ''));
                        const newLi = document.createElement('li');
                        newLi.className = "flex justify-between items-center py-2 border-b border-gray-100 last:border-0 hover:bg-gray-100 rounded px-2 transition-colors bg-green-50 group";
                        newLi.innerHTML = `
                            <a href="https://${username}.github.io/${repoNameOnly}/${filename}" target="_blank" class="text-green-700 font-bold group-hover:text-green-800 truncate max-w-[70%]">
                                ✨ ${cleanName}
                            </a>
                            <span class="text-xs text-white bg-green-500 font-bold px-2 py-0.5 rounded-full whitespace-nowrap animate-pulse">
                                Vừa xong
                            </span>
                        `;
                        listEl.prepend(newLi); // Đưa lên dòng đầu tiên
                    }

                    // Reset form cho bài tiếp theo
                    document.getElementById('upload-filename').value = '';
                    document.getElementById('upload-content').value = '';
                } else {
                    statusEl.innerText = `❌ Lỗi: ${data.message}`;
                    statusEl.classList.add('text-red-600');
                }
            } catch (error) {
                statusEl.innerText = `❌ Lỗi mạng`;
                statusEl.classList.add('text-red-600');
            } finally {
                btn.innerText = "🚀 Đẩy Lên GitHub Ngay"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
