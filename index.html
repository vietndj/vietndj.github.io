<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vietndj - CMS Super Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 p-4 md:p-8">

    <header class="max-w-7xl mx-auto text-center mb-8 bg-indigo-800 text-white p-6 rounded-2xl shadow-xl border-b-4 border-indigo-900">
        <h1 class="text-3xl md:text-4xl font-black mb-2 uppercase tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-indigo-100">🚀 vietndj CMS Super Center</h1>
        <p class="text-indigo-200 font-medium">Quản lý File, Đổi Tên & Preview Nội Dung Trực Tiếp</p>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">

        <div class="lg:col-span-8 flex flex-col gap-6">
            <section class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
                <div class="flex flex-col sm:flex-row justify-between items-center border-b pb-4 mb-4 gap-4">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <span>📂</span> Hệ Thống Kho (Repos)
                    </h2>
                    <div class="flex gap-2 bg-gray-100 p-1 rounded-lg">
                        <button onclick="changeSortOrder('desc')" id="sort-desc" class="px-3 py-1.5 rounded-md text-sm font-bold bg-indigo-600 text-white shadow">Mới nhất ↓</button>
                        <button onclick="changeSortOrder('asc')" id="sort-asc" class="px-3 py-1.5 rounded-md text-sm font-bold text-gray-600 hover:bg-gray-200 transition">Cũ nhất ↑</button>
                        <button onclick="loadRepos()" class="ml-2 px-3 py-1.5 bg-white border border-gray-300 rounded-md text-sm hover:bg-gray-50 transition" title="Làm mới">🔄</button>
                    </div>
                </div>
                <div id="repo-container" class="flex flex-col gap-6">
                    <p class="text-center text-gray-500 italic animate-pulse py-10 text-lg">🚀 Đang quét & trích xuất nội dung từ GitHub...</p>
                </div>
            </section>
        </div>

        <div class="lg:col-span-4">
            <section class="bg-white p-6 rounded-xl shadow-lg border border-gray-200 border-t-4 border-t-green-500 sticky top-6">
                <h2 class="text-xl font-bold text-gray-800 border-b pb-3 mb-4 flex items-center gap-2">
                    <span>⚡</span> Tạo File HTML Ngay
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">🔑 GITHUB TOKEN</label>
                        <input type="password" id="github-token" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-green-500 text-sm bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">CHỌN KHO (Tự động điền khi bấm tên kho ở cột trái)</label>
                        <input type="text" id="upload-repo" value="vietndj/" class="w-full px-3 py-2 border rounded font-bold text-indigo-700 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">TÊN FILE MỚI (.html)</label>
                        <input type="text" id="upload-filename" placeholder="ten-bai-viet.html" class="w-full px-3 py-2 border rounded font-semibold focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">MÃ NGUỒN (HTML Code)</label>
                        <textarea id="upload-content" rows="10" class="w-full px-3 py-2 border rounded font-mono text-xs bg-gray-900 text-green-400 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="<html>...</html>"></textarea>
                    </div>
                    <button onclick="createFile()" id="btn-create" class="w-full bg-green-600 hover:bg-green-700 text-white font-extrabold py-3 rounded-lg transition-all shadow-lg transform active:scale-95">
                        🚀 PUSH LÊN GITHUB
                    </button>
                    <p id="upload-status" class="text-sm text-center font-bold p-2 rounded-lg hidden"></p>
                </div>
            </section>
        </div>
    </main>

    <script>
        const username = 'vietndj';
        let sortOrder = 'desc'; 
        let repoDataCache = {}; 

        const savedToken = localStorage.getItem('github_pat');
        if(savedToken) document.getElementById('github-token').value = savedToken;

        function getHeaders() {
            const t = document.getElementById('github-token').value.trim() || savedToken;
            return t ? { 'Authorization': `Bearer ${t}`, 'Accept': 'application/vnd.github.v3+json' } : {};
        }

        function changeSortOrder(order) {
            sortOrder = order;
            document.getElementById('sort-desc').className = order === 'desc' ? 'px-3 py-1.5 rounded-md text-sm font-bold bg-indigo-600 text-white shadow' : 'px-3 py-1.5 rounded-md text-sm font-bold text-gray-600 hover:bg-gray-200 transition';
            document.getElementById('sort-asc').className = order === 'asc' ? 'px-3 py-1.5 rounded-md text-sm font-bold bg-indigo-600 text-white shadow' : 'px-3 py-1.5 rounded-md text-sm font-bold text-gray-600 hover:bg-gray-200 transition';
            renderRepos(); 
        }

        // --- 1. QUÉT DỮ LIỆU & LẤY 500 KÝ TỰ PREVIEW ---
        async function loadRepos() {
            const container = document.getElementById('repo-container');
            container.innerHTML = '<p class="text-center text-gray-500 italic animate-pulse py-10 text-lg">🚀 Đang quét dữ liệu, trích xuất text...</p>';

            try {
                const resRepos = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`, { headers: getHeaders() });
                const repos = await resRepos.json();
                
                if (repos.message) throw new Error(repos.message);

                repoDataCache = {}; 

                for (const repo of repos) {
                    if (repo.name === `${username}.github.io`) continue;
                    
                    const resFiles = await fetch(`https://api.github.com/repos/${username}/${repo.name}/contents/`, { headers: getHeaders() });
                    const files = await resFiles.json();
                    
                    if (Array.isArray(files)) {
                        const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');
                        
                        const fileDetails = await Promise.all(htmlFiles.map(async file => {
                            let dateObj = new Date();
                            try {
                                const resCommit = await fetch(`https://api.github.com/repos/${username}/${repo.name}/commits?path=${file.path}&per_page=1`, { headers: getHeaders() });
                                const commitData = await resCommit.json();
                                if(commitData.length > 0) dateObj = new Date(commitData[0].commit.committer.date);
                            } catch(e) {}

                            let previewText = "Không có nội dung hiển thị...";
                            try {
                                const rawRes = await fetch(file.download_url); 
                                const htmlString = await rawRes.text();
                                
                                const doc = new DOMParser().parseFromString(htmlString, 'text/html');
                                const rawText = doc.body.textContent || "";
                                
                                const cleanText = rawText.replace(/\s+/g, ' ').trim();
                                if(cleanText.length > 0) {
                                    // ĐÃ CẬP NHẬT: LẤY 500 KÝ TỰ THAY VÌ 100
                                    previewText = cleanText.substring(0, 500) + (cleanText.length > 500 ? "..." : "");
                                }
                            } catch(e) {}
                            
                            return {
                                name: decodeURIComponent(file.name.replace('.html', '')),
                                fileName: file.name,
                                sha: file.sha,
                                url: `https://${username}.github.io/${repo.name}/${file.name}`,
                                timestamp: dateObj.getTime(),
                                fullDate: dateObj.toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric' }),
                                preview: previewText
                            };
                        }));
                        repoDataCache[repo.name] = fileDetails;
                    }
                }
                renderRepos();
            } catch(e) {
                container.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-lg font-bold text-center">❌ Lỗi: ${e.message}</div>`;
            }
        }

        function renderRepos() {
            const container = document.getElementById('repo-container');
            container.innerHTML = '';

            Object.keys(repoDataCache).forEach(repoName => {
                const files = [...repoDataCache[repoName]];
                files.sort((a, b) => sortOrder === 'desc' ? b.timestamp - a.timestamp : a.timestamp - b.timestamp);

                const card = document.createElement('div');
                card.className = "bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm";
                card.innerHTML = `
                    <div class="bg-indigo-50 px-4 py-3 flex justify-between items-center border-b border-indigo-100">
                        <h3 class="font-black text-indigo-800 uppercase text-sm tracking-wider cursor-pointer hover:underline" onclick="document.getElementById('upload-repo').value='${username}/${repoName}'">
                            📂 ${repoName} <span class="text-xs font-normal text-indigo-500">(Bấm chọn kho)</span>
                        </h3>
                    </div>
                    <ul class="divide-y divide-gray-100">
                        ${files.length === 0 ? '<li class="text-xs text-gray-400 p-4 italic text-center">Kho trống</li>' : ''}
                        ${files.map(f => `
                            <li class="p-4 hover:bg-gray-50 transition group flex flex-col gap-2">
                                <div class="flex justify-between items-start gap-2">
                                    <div class="flex-1 w-full">
                                        <div class="flex items-center gap-2 mb-1">
                                            <a href="${f.url}" target="_blank" class="font-bold text-lg text-indigo-700 hover:text-indigo-500 transition line-clamp-1" title="Xem trang">📄 ${f.name}</a>
                                            <button onclick="renameFile('${repoName}', '${f.fileName}', '${f.sha}')" class="text-gray-400 hover:text-blue-600 bg-gray-100 hover:bg-blue-50 px-2 py-0.5 rounded text-xs font-bold transition" title="Đổi tên file">✏️ Sửa Tên</button>
                                        </div>
                                        <p class="text-sm text-gray-600 italic mt-1 line-clamp-5 leading-relaxed bg-gray-50 p-3 rounded border border-gray-200 border-l-4 border-l-gray-400 shadow-inner text-justify">
                                            ${f.preview}
                                        </p>
                                    </div>
                                    <div class="flex flex-col items-end gap-1 shrink-0 ml-2">
                                        <span class="text-[10px] sm:text-xs font-mono font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded border border-gray-200 shadow-sm whitespace-nowrap">🕒 ${f.fullDate}</span>
                                    </div>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                `;
                container.appendChild(card);
            });
        }

        // --- 2. LOGIC ĐỔI TÊN FILE ---
        async function renameFile(repoName, oldFileName, fileSha) {
            const token = document.getElementById('github-token').value.trim() || savedToken;
            if(!token) return alert("❌ Bạn cần nhập GitHub Token vào ô bên phải để sử dụng tính năng này!");

            let newName = prompt(`Nhập tên file mới để thay thế cho:\n[ ${oldFileName} ]\n\nLưu ý: Viết liền không dấu, dùng gạch-ngang. VD: bai-viet-moi.html`, oldFileName);
            
            if (!newName || newName === oldFileName) return; 
            if (!newName.endsWith('.html')) newName += '.html';

            const confirmRename = confirm(`Hệ thống sẽ:\n1. Copy nội dung từ file cũ\n2. Tạo file mới: ${newName}\n3. Xóa file cũ: ${oldFileName}\n\nBạn có chắc chắn?`);
            if(!confirmRename) return;

            document.body.style.cursor = 'wait';

            try {
                const getRes = await fetch(`https://api.github.com/repos/${username}/${repoName}/contents/${oldFileName}`, { headers: getHeaders() });
                const oldData = await getRes.json();
                if(!getRes.ok) throw new Error("Không thể đọc file cũ.");

                const createRes = await fetch(`https://api.github.com/repos/${username}/${repoName}/contents/${newName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Đổi tên: Tạo ${newName}`, content: oldData.content })
                });
                if(!createRes.ok) throw new Error("Lỗi khi tạo file tên mới. (Có thể tên file đã tồn tại).");

                const deleteRes = await fetch(`https://api.github.com/repos/${username}/${repoName}/contents/${oldFileName}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Đổi tên: Xóa ${oldFileName}`, sha: fileSha })
                });

                alert(`✅ Thành công! Đã đổi tên thành: ${newName}`);
                loadRepos(); 

            } catch(e) {
                alert(`❌ Có lỗi xảy ra: ${e.message}`);
            } finally {
                document.body.style.cursor = 'default';
            }
        }

        // --- 3. LOGIC TẠO FILE TỰ ĐỘNG ---
        async function createFile() {
            const token = document.getElementById('github-token').value.trim();
            const repoPath = document.getElementById('upload-repo').value.trim();
            let name = document.getElementById('upload-filename').value.trim();
            const content = document.getElementById('upload-content').value;
            const status = document.getElementById('upload-status');
            const btn = document.getElementById('btn-create');

            if(!token || !repoPath || !name || !content) { alert("Thiếu dữ liệu!"); return; }
            if(!name.endsWith('.html')) name += '.html';
            localStorage.setItem('github_pat', token);

            btn.innerText = "⏳ ĐANG PUSH..."; btn.disabled = true;
            status.className = "text-sm text-center font-bold p-2 rounded-lg bg-yellow-100 text-yellow-700 block animate-pulse";
            status.innerText = "Đang truyền tải dữ liệu...";

            try {
                const base64 = btoa(unescape(encodeURIComponent(content)));
                const response = await fetch(`https://api.github.com/repos/${repoPath}/contents/${name}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Cập nhật: ${name}`, content: base64 })
                });

                if(response.ok) {
                    status.className = "text-sm text-center font-bold p-2 rounded-lg bg-green-100 text-green-700 block";
                    status.innerText = `✅ Đã tạo file thành công!`;
                    document.getElementById('upload-filename').value = '';
                    document.getElementById('upload-content').value = '';
                    
                    loadRepos();
                    
                    setTimeout(() => window.open(`https://${repoPath.split('/')[0]}.github.io/${repoPath.split('/')[1]}/${name}`, '_blank'), 2000);
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message);
                }
            } catch (e) {
                status.className = "text-sm text-center font-bold p-2 rounded-lg bg-red-100 text-red-700 block";
                status.innerText = `❌ Lỗi: ${e.message}`;
            } finally {
                btn.innerText = "🚀 PUSH LÊN GITHUB"; btn.disabled = false;
            }
        }

        loadRepos();
    </script>
</body>
</html>
