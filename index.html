<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vietndj - Private Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } 
        .kanban-scroll::-webkit-scrollbar { height: 8px; width: 6px; }
        .kanban-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .kanban-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Loại bỏ mũi tên mặc định của thẻ summary */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-50 transition-opacity duration-500">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center transform transition-all">
            <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">🔒</div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Khu Vực Riêng Tư</h2>
            <p class="text-slate-500 text-sm mb-6">Vui lòng nhập mã PIN để truy cập hệ thống.</p>
            <input type="password" id="pin-input" placeholder="••••" class="w-full text-center text-2xl tracking-[0.5em] font-bold px-4 py-3 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all mb-4" onkeypress="if(event.key === 'Enter') checkPIN()">
            <button onclick="checkPIN()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-md active:scale-95">MỞ KHÓA</button>
            <p id="login-error" class="text-red-500 text-sm font-bold mt-3 hidden">❌ Sai mã PIN. Thử lại!</p>
        </div>
    </div>

    <div id="app-content" class="hidden p-4 md:p-8">
        <header class="max-w-7xl mx-auto text-center mb-6 bg-slate-900 text-white p-6 rounded-2xl shadow-xl">
            <h1 class="text-3xl md:text-4xl font-black mb-2 uppercase tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">🚀 vietndj CMS Dashboard</h1>
            <p class="text-slate-400 font-medium">Hệ quản trị Nội dung Đa góc nhìn (Multi-view)</p>
            <button onclick="logout()" class="mt-4 text-xs bg-slate-800 hover:bg-red-900 text-slate-300 px-3 py-1 rounded-full transition border border-slate-700">🔒 Đóng khóa hệ thống</button>
        </header>

        <main class="max-w-7xl mx-auto flex flex-col gap-6">
            <section class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden transition-all duration-300">
                <button onclick="toggleUpload()" class="w-full px-6 py-4 flex justify-between items-center bg-emerald-50 hover:bg-emerald-100 transition text-emerald-800 font-bold border-b border-emerald-100 focus:outline-none">
                    <span class="flex items-center gap-2"><span>⚡</span> Mở công cụ Tạo File HTML (Upload)</span>
                    <span id="upload-icon" class="transform transition-transform duration-300">▼</span>
                </button>
                <div id="upload-section" class="hidden p-6 bg-white">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">🔑 GITHUB TOKEN</label><input type="password" id="github-token" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-emerald-500 text-sm bg-slate-50"></div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">CHỌN KHO</label><input type="text" id="upload-repo" value="vietndj/" class="w-full px-3 py-2 border rounded font-bold text-indigo-700 bg-slate-50"></div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">TÊN FILE MỚI (.html)</label><input type="text" id="upload-filename" placeholder="ten-bai-viet.html" class="w-full px-3 py-2 border rounded font-semibold focus:ring-2 focus:ring-emerald-500"></div>
                    </div>
                    <div class="mb-4"><label class="block text-xs font-bold text-slate-500 mb-1">MÃ NGUỒN (HTML Code)</label><textarea id="upload-content" rows="6" class="w-full px-3 py-2 border rounded font-mono text-xs bg-slate-900 text-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea></div>
                    <button onclick="createFile()" id="btn-create" class="w-full md:w-auto px-8 bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-3 rounded-lg transition-all shadow-md active:scale-95">🚀 PUSH LÊN GITHUB</button>
                    <p id="upload-status" class="text-sm font-bold mt-3 hidden px-4 py-2 rounded-lg inline-block"></p>
                </div>
            </section>

            <section class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4 sticky top-4 z-10">
                <div class="flex items-center gap-2 overflow-x-auto pb-1 md:pb-0 w-full md:w-auto kanban-scroll">
                    <span class="text-sm font-bold text-slate-500 mr-2">Góc nhìn:</span>
                    <button onclick="setView('list')" id="btn-view-list" class="px-3 py-1.5 rounded-md text-sm font-bold transition flex items-center gap-1 bg-indigo-600 text-white shadow">📝 List</button>
                    <button onclick="setView('gallery')" id="btn-view-gallery" class="px-3 py-1.5 rounded-md text-sm font-bold transition flex items-center gap-1 text-slate-600 hover:bg-slate-100">🪟 Gallery</button>
                    <button onclick="setView('kanban')" id="btn-view-kanban" class="px-3 py-1.5 rounded-md text-sm font-bold transition flex items-center gap-1 text-slate-600 hover:bg-slate-100">📋 Kanban</button>
                    <button onclick="setView('table')" id="btn-view-table" class="px-3 py-1.5 rounded-md text-sm font-bold transition flex items-center gap-1 text-slate-600 hover:bg-slate-100">📊 Table</button>
                    <button onclick="setView('feed')" id="btn-view-feed" class="px-3 py-1.5 rounded-md text-sm font-bold transition flex items-center gap-1 text-slate-600 hover:bg-slate-100">📰 Feed</button>
                </div>
                <div class="flex gap-2 w-full md:w-auto justify-end">
                    <button onclick="changeSortOrder('desc')" id="sort-desc" class="px-3 py-1.5 rounded-md text-sm font-bold bg-slate-800 text-white shadow">Mới nhất ↓</button>
                    <button onclick="changeSortOrder('asc')" id="sort-asc" class="px-3 py-1.5 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-200 transition">Cũ nhất ↑</button>
                    <button onclick="loadRepos()" class="px-3 py-1.5 bg-slate-100 text-slate-600 rounded-md text-sm hover:bg-slate-200 font-bold transition">🔄 Làm mới</button>
                </div>
            </section>

            <div id="repo-container" class="transition-all duration-300">
                <p class="text-center text-slate-500 italic py-10 text-lg">Hệ thống đang chờ lệnh...</p>
            </div>
        </main>
    </div>

    <script>
        const SECRET_PIN = "0070";
        window.onload = () => { if (localStorage.getItem("cms_auth") === "granted") unlockSystem(); else document.getElementById('pin-input').focus(); };
        function checkPIN() { if (document.getElementById('pin-input').value === SECRET_PIN) { localStorage.setItem("cms_auth", "granted"); unlockSystem(); } else { document.getElementById('login-error').classList.remove('hidden'); document.getElementById('pin-input').value = ''; } }
        function unlockSystem() { document.getElementById('login-screen').style.opacity = "0"; setTimeout(() => { document.getElementById('login-screen').classList.add('hidden'); const app = document.getElementById('app-content'); app.classList.remove('hidden'); app.classList.add('fade-in'); loadRepos(); }, 300); }
        function logout() { localStorage.removeItem("cms_auth"); location.reload(); }

        const username = 'vietndj';
        let sortOrder = 'desc', currentView = 'list', repoDataCache = {}, allFilesCache = [];
        let allContentCache = {}; 
        
        const savedToken = localStorage.getItem('github_pat');
        if(savedToken) document.getElementById('github-token').value = savedToken;
        function getHeaders() { const t = document.getElementById('github-token').value.trim() || savedToken; return t ? { 'Authorization': `Bearer ${t}`, 'Accept': 'application/vnd.github.v3+json' } : {}; }
        
        function toggleUpload() { const s = document.getElementById('upload-section'), i = document.getElementById('upload-icon'); if(s.classList.contains('hidden')){ s.classList.remove('hidden'); i.style.transform='rotate(180deg)';} else {s.classList.add('hidden'); i.style.transform='rotate(0deg)';} }
        function changeSortOrder(order) { sortOrder = order; document.getElementById('sort-desc').className = order === 'desc' ? 'px-3 py-1.5 rounded-md text-sm font-bold bg-slate-800 text-white shadow' : 'px-3 py-1.5 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-200 transition'; document.getElementById('sort-asc').className = order === 'asc' ? 'px-3 py-1.5 rounded-md text-sm font-bold bg-slate-800 text-white shadow' : 'px-3 py-1.5 rounded-md text-sm font-bold text-slate-600 hover:bg-slate-200 transition'; renderRepos(); }
        function setView(view) { currentView = view; ['gallery','kanban','table','feed','list'].forEach(v => { document.getElementById(`btn-view-${v}`).className = v === view ? 'px-3 py-1.5 rounded-md text-sm font-bold transition flex items-center gap-1 bg-indigo-600 text-white shadow' : 'px-3 py-1.5 rounded-md text-sm font-bold transition flex items-center gap-1 text-slate-600 hover:bg-slate-100'; }); renderRepos(); }

        async function loadRepos() {
            const container = document.getElementById('repo-container');
            container.innerHTML = '<p class="text-center text-slate-500 italic animate-pulse py-10 text-lg">🚀 Đang kết nối GitHub và trích xuất nội dung...</p>';
            try {
                const resRepos = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`, { headers: getHeaders() });
                const repos = await resRepos.json(); if (repos.message) throw new Error(repos.message);
                repoDataCache = {}; allFilesCache = []; allContentCache = {}; 
                
                for (const repo of repos) {
                    if (repo.name === `${username}.github.io`) continue;
                    const resFiles = await fetch(`https://api.github.com/repos/${username}/${repo.name}/contents/`, { headers: getHeaders() });
                    const files = await resFiles.json();
                    if (Array.isArray(files)) {
                        const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');
                        
                        const fileDetails = await Promise.all(htmlFiles.map(async file => {
                            let dateObj = new Date(); 
                            try { 
                                const resCommit = await fetch(`https://api.github.com/repos/${username}/${repo.name}/commits?path=${file.path}&per_page=1`, { headers: getHeaders() }); 
                                const commitData = await resCommit.json(); 
                                if(commitData.length > 0) dateObj = new Date(commitData[0].commit.committer.date); 
                            } catch(e) {} 
                            
                            const fileData = { 
                                repoName: repo.name, 
                                name: decodeURIComponent(file.name.replace('.html', '')), 
                                fileName: file.name, 
                                sha: file.sha, 
                                url: `https://${username}.github.io/${repo.name}/${file.name}`, 
                                downloadUrl: file.download_url || "", 
                                timestamp: dateObj.getTime(), 
                                fullDate: dateObj.toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric' }), 
                                preview: "Đang tải...", 
                                tocHTML: "", 
                                coverHTML: ""
                            };
                            allFilesCache.push(fileData); 
                            return fileData;
                        }));
                        repoDataCache[repo.name] = fileDetails;
                    }
                }
                renderRepos();
            } catch(e) { container.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-lg font-bold text-center shadow">❌ Lỗi API: ${e.message}</div>`; }
        }

        let previewObserver; 

        function renderRepos() {
            const container = document.getElementById('repo-container'); container.innerHTML = ''; container.className = ''; 
            
            // Lọc và Sắp xếp Mảng Tất cả File
            let sortedAllFiles = [...allFilesCache].sort((a, b) => sortOrder === 'desc' ? b.timestamp - a.timestamp : a.timestamp - b.timestamp);
            if (sortedAllFiles.length === 0) { container.innerHTML = '<div class="text-center py-12 text-slate-500 bg-white rounded-xl shadow border">Kho trống, chưa có bài viết nào!</div>'; return; }

            // YÊU CẦU 1: Thuật toán sắp xếp các REPO dựa trên thời gian bài viết mới nhất bên trong nó
            let repoEntries = Object.keys(repoDataCache).map(repoName => {
                let files = [...repoDataCache[repoName]].sort((a, b) => sortOrder === 'desc' ? b.timestamp - a.timestamp : a.timestamp - b.timestamp);
                let latestUpdate = files.length > 0 ? files[0].timestamp : 0; // Lấy thời gian bài mới nhất
                return { repoName, files, latestUpdate };
            });
            // Xếp hạng thư mục
            repoEntries.sort((a, b) => sortOrder === 'desc' ? b.latestUpdate - a.latestUpdate : a.latestUpdate - b.latestUpdate);

            if (previewObserver) previewObserver.disconnect();
            
            previewObserver = new IntersectionObserver(async (entries, observer) => {
                for (const entry of entries) {
                    if (entry.isIntersecting) {
                        const target = entry.target;
                        const { repoName, fileName, fileSha, fileUrl, downloadUrl } = target.dataset; 
                        observer.unobserve(target);
                        
                        try {
                            await renderFilePreview(repoName, fileName, fileSha, fileUrl, downloadUrl);
                        } catch (err) {
                            const pEl = document.getElementById(`preview-${fileSha}`);
                            if(pEl) pEl.innerHTML = `<p class="text-red-500 text-xs font-bold bg-red-50 p-2 rounded">❌ Lỗi: ${err.message}</p>`;
                        }
                        await new Promise(res => setTimeout(res, 30)); 
                    }
                }
            }, { rootMargin: '300px' });

            let finalHTML = '';

            // YÊU CẦU 4: Gallery View theo chuẩn Masonry bằng CSS Columns (loại bỏ grid fixed)
            if (currentView === 'gallery') {
                container.className = 'columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-6'; // CSS Columns
                sortedAllFiles.forEach(f => {
                    // break-inside-avoid giúp thẻ không bị cắt đôi giữa 2 cột, mb-6 thay cho space-y
                    finalHTML += `<div class="observe-target break-inside-avoid mb-6 bg-white rounded-xl shadow-sm hover:shadow-xl transition-shadow duration-300 border border-slate-200 flex flex-col group" data-repo-name="${f.repoName}" data-file-name="${f.fileName}" data-file-sha="${f.sha}" data-file-url="${f.url}" data-download-url="${f.downloadUrl}"><div class="h-2 bg-gradient-to-r from-indigo-400 to-purple-400"></div><div id="cover-${f.sha}" class="w-full h-28 shrink-0 bg-slate-100 animate-pulse flex items-center justify-center text-slate-400 text-xs">${f.coverHTML}</div><div class="p-4 flex flex-col"><div class="flex justify-between items-start mb-2"><span class="text-[10px] uppercase font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded cursor-pointer hover:bg-indigo-100" onclick="document.getElementById('upload-repo').value='${username}/${f.repoName}'">📁 ${f.repoName}</span><button onclick="renameFile('${f.repoName}', '${f.fileName}', '${f.sha}')" class="text-slate-400 hover:text-blue-600 bg-slate-100 px-2 py-1 rounded text-[10px] font-bold opacity-0 group-hover:opacity-100 transition">✏️ Sửa</button></div><a href="${f.url}" target="_blank" class="font-bold text-base text-slate-800 hover:text-indigo-600 mb-2 line-clamp-2 leading-tight">📄 ${f.name}</a><div id="preview-${f.sha}" class="text-xs text-slate-500 italic line-clamp-5 leading-relaxed space-y-2 mb-2"><p class="animate-pulse">${f.preview}</p></div></div><div class="bg-slate-50 p-3 shrink-0 border-t border-slate-100 text-[11px] text-slate-400 font-mono font-bold flex justify-between items-center"><span>🕒 ${f.fullDate}</span></div></div>`;
                });
                container.innerHTML = finalHTML;
                container.querySelectorAll('.observe-target').forEach(el => previewObserver.observe(el));
            } 
            else if (currentView === 'kanban') {
                container.className = 'flex kanban-scroll overflow-x-auto gap-6 pb-6 items-start h-[75vh]';
                repoEntries.forEach(({repoName, files}) => {
                    finalHTML += `<div class="bg-slate-100 rounded-xl w-80 min-w-[320px] shrink-0 border border-slate-200 flex flex-col max-h-full"><div class="p-3 border-b border-slate-200 flex justify-between items-center cursor-pointer hover:bg-slate-200 transition rounded-t-xl" onclick="document.getElementById('upload-repo').value='${username}/${repoName}'"><h3 class="font-black text-slate-700 uppercase tracking-wide">📂 ${repoName}</h3><span class="bg-slate-300 text-slate-700 text-xs font-bold px-2 py-0.5 rounded-full">${files.length}</span></div><div class="p-3 overflow-y-auto flex-1 kanban-scroll space-y-3">${files.map(f => `<div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200 group relative"><button onclick="renameFile('${f.repoName}', '${f.fileName}', '${f.sha}')" class="absolute top-2 right-2 text-slate-400 hover:text-blue-600 bg-slate-100 px-1.5 py-0.5 rounded text-[10px] font-bold opacity-0 group-hover:opacity-100 transition">✏️</button><a href="${f.url}" target="_blank" class="font-bold text-sm text-slate-800 hover:text-indigo-600 block pr-6 mb-1">📄 ${f.name}</a><p class="text-[11px] text-slate-500 line-clamp-3 mb-2">${f.preview}</p><span class="text-[10px] font-mono text-slate-400">🕒 ${f.fullDate}</span></div>`).join('')}</div></div>`; 
                });
                container.innerHTML = finalHTML;
            }
            // YÊU CẦU 2: Nhóm Accordion cho Table
            else if (currentView === 'table') {
                container.className = 'flex flex-col gap-6';
                repoEntries.forEach(({repoName, files}) => {
                    if(files.length === 0) return;
                    finalHTML += `
                    <details open class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden group">
                        <summary class="bg-slate-50 px-5 py-4 border-b border-slate-200 cursor-pointer list-none flex justify-between items-center select-none">
                            <h3 class="font-black text-slate-700 uppercase tracking-widest text-sm hover:text-indigo-600 transition" onclick="document.getElementById('upload-repo').value='${username}/${repoName}'; event.stopPropagation();">📂 ${repoName} <span class="text-xs text-slate-400 font-normal ml-2">(${files.length} bài)</span></h3>
                            <span class="text-slate-400 group-open:rotate-180 transition-transform duration-300">▼</span>
                        </summary>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse min-w-[800px]">
                                <thead><tr class="bg-white text-slate-400 uppercase text-[10px] tracking-wider border-b border-slate-100"><th class="p-3 font-bold w-1/4">Tên Bài Viết</th><th class="p-3 font-bold w-1/2">Trích đoạn</th><th class="p-3 font-bold w-1/6">Cập nhật</th><th class="p-3 font-bold text-center">Hành động</th></tr></thead>
                                <tbody class="divide-y divide-slate-100">
                                    ${files.map(f => `<tr class="hover:bg-slate-50 transition"><td class="p-3"><a href="${f.url}" target="_blank" class="font-bold text-indigo-700 text-sm hover:underline">📄 ${f.name}</a></td><td class="p-3 text-xs text-slate-500 italic line-clamp-2">${f.preview}</td><td class="p-3 text-xs font-mono text-slate-400 whitespace-nowrap">${f.fullDate}</td><td class="p-3 text-center"><button onclick="renameFile('${f.repoName}', '${f.fileName}', '${f.sha}')" class="text-blue-600 hover:bg-blue-50 px-2 py-1 rounded text-xs font-bold transition">Đổi tên</button></td></tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>`;
                });
                container.innerHTML = finalHTML;
            }
            // YÊU CẦU 5: Feed Masonry
            else if (currentView === 'feed') {
                container.className = 'columns-1 lg:columns-2 gap-8'; // Dùng Masonry columns-2
                sortedAllFiles.forEach(f => {
                    finalHTML += `<article class="observe-target break-inside-avoid mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition" data-repo-name="${f.repoName}" data-file-name="${f.fileName}" data-file-sha="${f.sha}" data-file-url="${f.url}" data-download-url="${f.downloadUrl}"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl">${f.repoName.charAt(0).toUpperCase()}</div><div><p class="text-sm font-bold text-slate-800">vietndj <span class="text-slate-400 font-normal">đã đăng trong</span> <span class="text-indigo-600 cursor-pointer hover:underline" onclick="document.getElementById('upload-repo').value='${username}/${f.repoName}'">${f.repoName}</span></p><p class="text-xs font-mono text-slate-400">🕒 ${f.fullDate}</p></div></div><h2 class="text-2xl font-black text-slate-800 mb-4 hover:text-indigo-600 transition"><a href="${f.url}" target="_blank">${f.name}</a></h2><div id="cover-${f.sha}" class="w-full h-48 bg-slate-100 animate-pulse flex items-center justify-center text-slate-400 mb-4 rounded-xl overflow-hidden">${f.coverHTML}</div><div id="preview-${f.sha}" class="text-slate-600 text-base leading-relaxed mb-4 p-4 rounded-xl border-l-4 border-l-indigo-300 italic animate-pulse space-y-2"><p>${f.preview}</p></div><div class="flex gap-2"><a href="${f.url}" target="_blank" class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-100 transition">Đọc tiếp ➔</a><button onclick="renameFile('${f.repoName}', '${f.fileName}', '${f.sha}')" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-200 transition">✏️ Đổi tên</button></div></article>`;
                });
                container.innerHTML = finalHTML;
                container.querySelectorAll('.observe-target').forEach(el => previewObserver.observe(el));
            }
            // YÊU CẦU 2 & 3: List View theo nhóm, dạng lưới cột xếp khít (Masonry-like lưới 2 cột)
            else {
                container.className = 'columns-1 space-y-6';
                repoEntries.forEach(({repoName, files}) => {
                    if(files.length === 0) return;
                    finalHTML += `
                    <details open class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm group break-inside-avoid">
                        <summary class="bg-slate-800 px-5 py-4 border-b border-slate-900 cursor-pointer list-none flex justify-between items-center select-none">
                            <h3 class="font-black text-white uppercase text-sm tracking-widest hover:text-indigo-300 transition" onclick="document.getElementById('upload-repo').value='${username}/${repoName}'; event.stopPropagation();">📂 ${repoName} <span class="text-xs text-slate-400 font-normal normal-case ml-2">(${files.length} bài viết)</span></h3>
                            <span class="text-white group-open:rotate-180 transition-transform duration-300">▼</span>
                        </summary>
                        <div class="p-4 bg-slate-50">
                            <ul class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                ${files.map(f => `
                                <li class="flex flex-col p-4 bg-white border border-slate-200 rounded-xl hover:shadow-md hover:border-indigo-200 transition group relative">
                                    <div class="flex justify-between items-start mb-2">
                                        <a href="${f.url}" target="_blank" class="font-bold text-slate-700 text-sm hover:text-indigo-600 line-clamp-2 pr-8 leading-tight">📄 ${f.name}</a>
                                        <button onclick="renameFile('${f.repoName}', '${f.fileName}', '${f.sha}')" class="absolute top-4 right-4 text-slate-400 hover:text-blue-600 bg-slate-50 hover:bg-blue-50 px-2 py-1 rounded text-[10px] font-bold transition opacity-0 group-hover:opacity-100">✏️</button>
                                    </div>
                                    <span class="text-[11px] text-slate-500 italic line-clamp-2 mb-3 flex-1">${f.preview.substring(0, 100)}...</span>
                                    <div class="text-[10px] font-mono font-bold text-slate-400 bg-slate-50 self-start px-2 py-1 rounded">🕒 ${f.fullDate}</div>
                                </li>`).join('')}
                            </ul>
                        </div>
                    </details>`; 
                });
                container.innerHTML = finalHTML;
            }
        }

        async function getFileContent(repoName, fileName, fileSha, fileUrl, downloadUrl) {
            if (allContentCache[fileSha]) return allContentCache[fileSha]; 

            let contentData = { tocHTML: '', previewText: 'Đang xử lý nội dung...', coverHTML: '' };
            try {
                let htmlString = "";
                const reqHeaders = { ...getHeaders(), 'Accept': 'application/vnd.github.v3.raw' };

                const response = await fetch(`https://api.github.com/repos/${username}/${repoName}/contents/${fileName}`, { headers: reqHeaders });
                
                if (response.ok) { htmlString = await response.text(); } 
                else {
                    if (downloadUrl) {
                        const fallbackRes = await fetch(downloadUrl);
                        if(fallbackRes.ok) htmlString = await fallbackRes.text();
                    } else throw new Error("Lỗi API tải nội dung");
                }

                if (!htmlString) throw new Error("Nội dung trống.");

                const doc = new DOMParser().parseFromString(htmlString, 'text/html');

                let mainTitle = doc.querySelector('title')?.textContent || doc.querySelector('h1')?.textContent || fileName.replace('.html', '');
                const gradients = ['from-blue-600 to-cyan-500', 'from-emerald-600 to-teal-500', 'from-purple-600 to-fuchsia-500', 'from-orange-500 to-amber-500', 'from-indigo-600 to-blue-500', 'from-rose-500 to-red-500'];
                const hashInt = parseInt(fileSha.substring(0, 5), 16) || 0;
                contentData.coverHTML = `<div class="w-full h-full bg-gradient-to-br ${gradients[hashInt % gradients.length]} p-4 flex items-center justify-center opacity-90 hover:opacity-100 transition"><h3 class="text-white font-black text-center text-[15px] line-clamp-3 leading-snug drop-shadow-md px-2">${mainTitle}</h3></div>`;

                const headings = doc.querySelectorAll('h1, h2, h3');
                let tocList = [];
                headings.forEach((h, index) => {
                    if (!h.id) h.id = `toc-${index}`;
                    tocList.push(`<li class="truncate"><a href="${fileUrl}#${h.id}" class="hover:text-indigo-600 transition" target="_blank">• ${h.textContent.trim()}</a></li>`);
                });
                
                // YÊU CẦU 5: Nếu đang ở Feed view, thẻ details sẽ bung sẵn (thuộc tính open)
                if (tocList.length > 0) {
                    contentData.tocHTML = `<details class="bg-indigo-50/50 border border-indigo-100 p-3 rounded-xl text-xs text-slate-700 mb-3 cursor-pointer group toc-element"><summary class="font-bold text-indigo-800 flex items-center justify-between"><span>📋 Mục lục bài viết (${tocList.length})</span><span class="group-open:rotate-180 transition-transform">▼</span></summary><ul class="mt-3 space-y-2 border-t border-indigo-100 pt-2">${tocList.join('')}</ul></details>`;
                }

                const scripts = doc.querySelectorAll('script, style'); scripts.forEach(s => s.remove());
                const cleanText = (doc.body.textContent || "").replace(/\s+/g, ' ').trim();
                if(cleanText.length > 0) contentData.previewText = cleanText.substring(0, 1000) + (cleanText.length > 1000 ? "..." : "");

                allContentCache[fileSha] = contentData; 
                return contentData;
            } catch(e) { throw e; }
        }

        async function renderFilePreview(repoName, fileName, fileSha, fileUrl, downloadUrl) {
            const previewData = await getFileContent(repoName, fileName, fileSha, fileUrl, downloadUrl);
            
            allFilesCache.forEach(f => { if (f.sha === fileSha) { f.tocHTML = previewData.tocHTML; f.preview = previewData.previewText; f.coverHTML = previewData.coverHTML; } });
            if(repoDataCache[repoName]){ repoDataCache[repoName].forEach(f => { if (f.sha === fileSha) { f.tocHTML = previewData.tocHTML; f.preview = previewData.previewText; f.coverHTML = previewData.coverHTML; } }); }

            const previewElement = document.getElementById(`preview-${fileSha}`);
            const coverContainer = document.getElementById(`cover-${fileSha}`);
            
            if (previewElement) {
                previewElement.innerHTML = `${previewData.tocHTML}<p class="mt-2 text-[13px]">${previewData.previewText}</p>`;
                previewElement.classList.remove('animate-pulse'); 
                
                // YÊU CẦU 5: Tự động bung TOC và xóa line-clamp cho view Feed để nó thả nổi chiều dài
                if (currentView === 'feed') {
                    previewElement.classList.remove('line-clamp-5');
                    const tocDetails = previewElement.querySelector('.toc-element');
                    if (tocDetails) tocDetails.setAttribute('open', '');
                } else {
                    previewElement.classList.add('line-clamp-5');
                }
            }
            if (coverContainer && previewData.coverHTML) {
                coverContainer.outerHTML = `<div id="cover-${fileSha}" class="w-full shrink-0 ${currentView === 'gallery' ? 'h-28' : 'h-48'} overflow-hidden">${previewData.coverHTML}</div>`;
            }
        }

        async function renameFile(repoName, oldFileName, fileSha) {
            const token = document.getElementById('github-token').value.trim() || savedToken; if(!token) return alert("❌ Cần Token!");
            let newName = prompt(`Đổi tên:\n[ ${oldFileName} ]`, oldFileName); if (!newName || newName === oldFileName) return; if (!newName.endsWith('.html')) newName += '.html'; if(!confirm(`Xác nhận đổi thành: ${newName}?`)) return;
            document.body.style.cursor = 'wait';
            try {
                const getRes = await fetch(`https://api.github.com/repos/${username}/${repoName}/contents/${oldFileName}`, { headers: getHeaders() }); const oldData = await getRes.json();
                await fetch(`https://api.github.com/repos/${username}/${repoName}/contents/${newName}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `Đổi tên: Tạo ${newName}`, content: oldData.content }) });
                await fetch(`https://api.github.com/repos/${username}/${repoName}/contents/${oldFileName}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `Đổi tên: Xóa ${oldFileName}`, sha: fileSha }) });
                await loadRepos(); 
            } catch(e) { alert(`❌ Lỗi: ${e.message}`); } finally { document.body.style.cursor = 'default'; }
        }

        async function createFile() {
            const token = document.getElementById('github-token').value.trim(), repoPath = document.getElementById('upload-repo').value.trim(); let name = document.getElementById('upload-filename').value.trim(); const content = document.getElementById('upload-content').value, status = document.getElementById('upload-status'), btn = document.getElementById('btn-create');
            if(!token || !repoPath || !name || !content) return alert("Thiếu dữ liệu!"); if(!name.endsWith('.html')) name += '.html'; localStorage.setItem('github_pat', token);
            btn.innerText = "⏳ ĐANG PUSH..."; btn.disabled = true; status.className = "text-sm mt-3 px-4 py-2 font-bold rounded-lg bg-yellow-100 text-yellow-700 block animate-pulse"; status.innerText = "Đang xử lý...";
            try {
                const response = await fetch(`https://api.github.com/repos/${repoPath}/contents/${name}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `Tạo mới: ${name}`, content: btoa(unescape(encodeURIComponent(content))) }) });
                if(response.ok) { status.className = "text-sm mt-3 px-4 py-2 font-bold rounded-lg bg-emerald-100 text-emerald-700 block"; status.innerText = `✅ Đã tạo: ${name}`; document.getElementById('upload-filename').value = ''; document.getElementById('upload-content').value = ''; loadRepos(); setTimeout(() => window.open(`https://${repoPath.split('/')[0]}.github.io/${repoPath.split('/')[1]}/${name}`, '_blank'), 2000); } else throw new Error((await response.json()).message);
            } catch (e) { status.className = "text-sm mt-3 px-4 py-2 font-bold rounded-lg bg-red-100 text-red-700 block"; status.innerText = `❌ Lỗi: ${e.message}`; } finally { btn.innerText = "🚀 PUSH LÊN GITHUB"; btn.disabled = false; }
        }
    </script>

<div id="vietndj-pomodoro-widget">
    <div id="pomo-header">
        <span>⏱️ Timer (<span id="pomo-mini-time">25:00</span>)</span>
        <span id="pomo-icon">▼</span>
    </div>
    
    <div id="pomo-content">
        <audio id="pomo-audio" src="1.mp3" preload="auto"></audio>
        
        <div class="pomo-tabs">
            <button class="pomo-tab active" data-time="1500" data-color="#E9504F">Focus</button>
            <button class="pomo-tab" data-time="300" data-color="#38858A">Ngắn</button>
            <button class="pomo-tab" data-time="900" data-color="#38858A">Dài</button>
        </div>
        
        <div class="pomo-time" id="pomo-main-time">25:00</div>
        
        <div class="pomo-input-group">
            <input type="text" id="pomo-task" class="pomo-input" placeholder="Nhập mục đích khối..." autocomplete="off">
            <select id="pomo-sound" class="pomo-select">
                <option value="1.mp3">🎵 Chuông 1</option>
                <option value="2.mp3">🎵 Chuông 2</option>
                <option value="3.mp3">🎵 Chuông 3</option>
                <option value="4.mp3">🎵 Chuông 4</option>
                <option value="5.mp3">🎵 Chuông 5</option>
            </select>
        </div>
        
        <div class="pomo-controls">
            <button class="pomo-btn-start" id="pomo-start">BẮT ĐẦU</button>
            <button class="pomo-btn-reset" id="pomo-reset">Đặt lại</button>
        </div>
        
        <div class="pomo-history-toggle" id="pomo-history-btn">Xem lịch sử làm việc ▼</div>
        <div class="pomo-history" id="pomo-history-list">
            </div>
    </div>
</div>

<script>
// Sử dụng IIFE để bọc code JS, tránh xung đột biến với hệ thống CMS của bạn
(function() {
    const header = document.getElementById('pomo-header');
    const content = document.getElementById('pomo-content');
    const icon = document.getElementById('pomo-icon');
    const miniTime = document.getElementById('pomo-mini-time');
    
    // 1. Logic Accordion Chính
    header.addEventListener('click', () => {
        if (content.style.display === 'block') {
            content.style.display = 'none';
            icon.textContent = '▼';
        } else {
            content.style.display = 'block';
            icon.textContent = '▲';
        }
    });

    let timerInterval;
    let totalSeconds = 1500;
    let secondsLeft = totalSeconds;
    let isRunning = false;
    let endTime;
    
    // Load lịch sử từ LocalStorage để không mất khi tải lại trang web
    let historyData = JSON.parse(localStorage.getItem('pomoHistory')) || {}; 

    const mainTime = document.getElementById('pomo-main-time');
    const tabs = document.querySelectorAll('.pomo-tab');
    const taskInput = document.getElementById('pomo-task');
    const startBtn = document.getElementById('pomo-start');
    const resetBtn = document.getElementById('pomo-reset');
    const soundSelect = document.getElementById('pomo-sound');
    const audioPlayer = document.getElementById('pomo-audio');
    
    const historyBtn = document.getElementById('pomo-history-btn');
    const historyList = document.getElementById('pomo-history-list');

    // 2. Logic Accordion Lịch sử
    historyBtn.addEventListener('click', () => {
        if (historyList.style.display === 'block') {
            historyList.style.display = 'none';
            historyBtn.textContent = 'Xem lịch sử làm việc ▼';
        } else {
            historyList.style.display = 'block';
            historyBtn.textContent = 'Ẩn lịch sử ▲';
            renderHistory();
        }
    });

    soundSelect.addEventListener('change', (e) => { audioPlayer.src = e.target.value; });

    function updateDisplay() {
        let m = Math.floor(secondsLeft / 60);
        let s = secondsLeft % 60;
        let str = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        mainTime.textContent = str;
        miniTime.textContent = str; // Cập nhật cả ở thẻ tiêu đề Accordion thu gọn
        // Đổi Title Tab web CMS của bạn
        document.title = isRunning ? `(${str}) CMS Dashboard` : "vietndj CMS";
    }

    function renderHistory() {
        historyList.innerHTML = '';
        let sorted = Object.keys(historyData).sort((a,b) => historyData[b] - historyData[a]);
        
        if(sorted.length === 0) {
            historyList.innerHTML = '<div style="color:#666;text-align:center;padding:10px 0;">Chưa có dữ liệu hôm nay</div>';
            return;
        }

        sorted.forEach(task => {
            historyList.innerHTML += `
                <div class="pomo-history-item">
                    <span class="pomo-history-task" title="${task}">${task}</span>
                    <span class="pomo-history-time">${historyData[task]}p</span>
                </div>`;
        });
    }

    function completeTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        secondsLeft = 0;
        updateDisplay();
        
        audioPlayer.currentTime = 0;
        let p = audioPlayer.play();
        if(p !== undefined) p.catch(()=>console.log("Cần click trang web để phát âm thanh"));

        startBtn.disabled = false;
        startBtn.textContent = "BẮT ĐẦU";
        
        let taskName = taskInput.value.trim() || "Làm việc";
        let duration = Math.round(totalSeconds / 60);
        
        // Cộng dồn và lưu vào LocalStorage
        historyData[taskName] = (historyData[taskName] || 0) + duration;
        localStorage.setItem('pomoHistory', JSON.stringify(historyData));
        if(historyList.style.display === 'block') renderHistory();

        // Hiện thông báo hệ thống nhỏ gọn thay vì chặn toàn bộ web
        setTimeout(() => alert(`⏰ Hết giờ! Khối [${taskName}] đã được cộng thêm ${duration} phút.`), 100);
    }

    function startTimer() {
        if (!isRunning) {
            isRunning = true;
            startBtn.disabled = true;
            startBtn.textContent = "ĐANG CHẠY...";
            audioPlayer.pause();
            
            endTime = Date.now() + (secondsLeft * 1000);
            timerInterval = setInterval(() => {
                let now = Date.now();
                secondsLeft = Math.round((endTime - now) / 1000);
                if (secondsLeft <= 0) {
                    completeTimer();
                } else {
                    updateDisplay();
                }
            }, 200);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        startBtn.disabled = false;
        startBtn.textContent = "BẮT ĐẦU";
        secondsLeft = totalSeconds;
        updateDisplay();
    }

    // Đổi màu sắc và thời gian dựa trên Tab
    tabs.forEach(tab => {
        tab.addEventListener('click', (e) => {
            if (isRunning && !confirm("Bạn có chắc muốn hủy khối làm việc hiện tại?")) return;
            
            tabs.forEach(t => { 
                t.classList.remove('active'); 
                t.style.borderColor = '#444'; 
                t.style.color = '#888'; 
                t.style.backgroundColor = 'transparent';
            });
            
            let target = e.target;
            target.classList.add('active');
            let color = target.getAttribute('data-color');
            
            target.style.borderColor = color;
            target.style.color = color;
            target.style.backgroundColor = color === '#E9504F' ? 'rgba(233, 80, 79, 0.15)' : 'rgba(56, 133, 138, 0.15)';
            startBtn.style.backgroundColor = color;
            
            totalSeconds = parseInt(target.getAttribute('data-time'));
            resetTimer();
        });
    });

    updateDisplay();
})();
</script>
