<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vietndj - Trung Tâm Quản Lý</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 p-6 md:p-12">

    <header class="max-w-4xl mx-auto text-center mb-10">
        <h1 class="text-4xl font-extrabold text-indigo-700 mb-2">🌐 vietndj Hub</h1>
        <p class="text-gray-500 text-lg">Hệ thống sinh thái Kho lưu trữ & Bài viết</p>
    </header>

    <main class="max-w-4xl mx-auto">
        <div id="repo-container" class="grid grid-cols-1 gap-6">
            <p class="text-center text-gray-500 italic animate-pulse">⏳ Đang quét toàn bộ dữ liệu từ GitHub...</p>
        </div>
    </main>

    <script>
        const username = 'vietndj';
        const container = document.getElementById('repo-container');

        // 1. Lấy danh sách tất cả các kho (repos)
        fetch(`https://api.github.com/users/${username}/repos?sort=updated`)
            .then(res => res.json())
            .then(repos => {
                container.innerHTML = ''; // Xóa chữ loading

                repos.forEach(repo => {
                    // Bỏ qua kho chứa trang chủ này
                    if (repo.name === `${username}.github.io`) return;

                    // 2. Tạo khung (Card) cho mỗi kho
                    const repoCard = document.createElement('div');
                    repoCard.className = "bg-white p-6 rounded-xl shadow border border-gray-200";
                    repoCard.innerHTML = `
                        <h2 class="text-2xl font-bold text-gray-800 border-b pb-2 mb-4 flex items-center justify-between">
                            <span>📂 ${repo.name}</span>
                            <a href="https://${username}.github.io/${repo.name}/" target="_blank" class="text-sm text-indigo-500 hover:text-indigo-700 font-normal">Mở trang chủ kho ↗</a>
                        </h2>
                        <ul id="list-${repo.name}" class="flex flex-col gap-2 pl-2">
                            <li class="text-sm text-gray-400 italic loading-text">Đang tải bài viết...</li>
                        </ul>
                    `;
                    container.appendChild(repoCard);

                    // 3. Quét các file bên trong kho đó
                    fetch(`https://api.github.com/repos/${username}/${repo.name}/contents/`)
                        .then(res => res.json())
                        .then(files => {
                            const listContainer = document.getElementById(`list-${repo.name}`);
                            listContainer.innerHTML = ''; // Xóa chữ "đang tải bài viết..."

                            // Nếu kho trống hoặc bị lỗi API
                            if (!Array.isArray(files)) {
                                listContainer.innerHTML = '<li class="text-gray-500 text-sm">Không thể tải dữ liệu (Có thể kho trống).</li>';
                                return;
                            }

                            // Lọc ra các file .html và bỏ qua index.html
                            const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

                            if (htmlFiles.length === 0) {
                                listContainer.innerHTML = '<li class="text-gray-400 text-sm">Chưa có bài viết .html nào.</li>';
                                return;
                            }

                            // Hiển thị từng file thành link
                            htmlFiles.forEach(file => {
                                let name = decodeURIComponent(file.name.replace('.html', ''));
                                listContainer.innerHTML += `
                                    <li>
                                        <a href="https://${username}.github.io/${repo.name}/${file.name}" target="_blank" class="text-gray-700 hover:text-indigo-600 hover:underline flex items-center gap-2 transition-colors">
                                            📄 ${name}
                                        </a>
                                    </li>
                                `;
                            });
                        })
                        .catch(err => {
                            document.getElementById(`list-${repo.name}`).innerHTML = '<li class="text-red-400 text-sm">Lỗi quét file.</li>';
                        });
                });
            })
            .catch(err => {
                container.innerHTML = '<p class="text-red-500 text-center">❌ Lỗi kết nối đến GitHub API.</p>';
            });
    </script>
</body>
</html>
