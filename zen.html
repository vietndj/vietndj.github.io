<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14:15 Discipline</title>
    <style>
        :root {
            /* Mặc định - Ngoài giờ */
            --bg-color: #121212; 
            --text-main: #E0E0E0;
            --text-accent: #757575;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Các trạng thái thị trường */
        body.state-neutral {
            --bg-color: #0a0a0a;
            --text-accent: #555555;
        }
        body.state-focus {
            --bg-color: #15191e; /* Ánh xanh mờ giúp tập trung */
            --text-accent: #64B5F6;
        }
        body.state-discipline {
            --bg-color: #1c1414; /* Ánh đỏ mờ cảnh báo vùng 14:15 */
            --text-accent: #E57373;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color 3s ease, color 3s ease; /* Chuyển đổi màu Zen (từ từ) */
            text-align: center;
            user-select: none;
        }

        .clock {
            font-size: 8rem;
            font-weight: 200;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums; /* Giữ các con số cố định chiều rộng */
            margin-bottom: 1rem;
            transition: transform 0.5s ease;
        }

        .phase {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--text-accent);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 2rem;
            transition: color 3s ease;
        }

        .mantra {
            font-size: 1.1rem;
            color: #888;
            max-width: 500px;
            line-height: 1.6;
            font-weight: 300;
            opacity: 0.6;
        }
    </style>
</head>
<body class="state-neutral" id="body-state">

    <div class="clock" id="clock">00:00:00</div>
    <div class="phase" id="phase-text">Ngoài Giờ Giao Dịch</div>
    <div class="mantra" id="mantra-text">Giữ tâm trí tĩnh lặng. Kỷ luật là tự do.</div>

    <script>
        function updateDashboard() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const timeFloat = hours + minutes / 60;

            // Cập nhật đồng hồ
            const timeString = 
                String(hours).padStart(2, '0') + ':' + 
                String(minutes).padStart(2, '0') + ':' + 
                String(seconds).padStart(2, '0');
            document.getElementById('clock').textContent = timeString;

            const body = document.getElementById('body-state');
            const phaseText = document.getElementById('phase-text');
            const mantraText = document.getElementById('mantra-text');

            // Logic thời gian giao dịch (Thị trường VN)
            const isMorningSession = (timeFloat >= 9 && timeFloat < 11.5);
            const isAfternoonSession = (timeFloat >= 13 && timeFloat < 14.25);
            const isDisciplineZone = (timeFloat >= 14.25 && timeFloat < 14.75); // 14:15 - 14:45 (Bao gồm ATC)

            if (isDisciplineZone) {
                body.className = 'state-discipline';
                phaseText.textContent = 'Vùng Kỷ Luật 14:15';
                mantraText.textContent = 'Quan sát khối lượng. Chấp nhận rủi ro đã tính toán. Không giao dịch theo cảm xúc.';
            } else if (isMorningSession || isAfternoonSession) {
                body.className = 'state-focus';
                phaseText.textContent = 'Đang Giao Dịch';
                mantraText.textContent = 'Kiên nhẫn chờ đợi tín hiệu và lợi thế xác suất.';
            } else {
                body.className = 'state-neutral';
                phaseText.textContent = 'Nghỉ Ngơi';
                mantraText.textContent = 'Thị trường đã đóng. Đánh giá lại nhật ký giao dịch.';
            }
        }

        // Cập nhật mỗi giây
        setInterval(updateDashboard, 1000);
        updateDashboard(); // Gọi ngay lần đầu
    </script>



<script id="cms-pin-widget">
  if(localStorage.getItem("cms_auth") === "granted") {
    const path = window.location.pathname.split("/").filter(Boolean);
    let repo = "vietndj.github.io", file = "index.html";
    if (path.length > 1) { repo = path[0]; file = path.pop(); }
    else if (path.length === 1) { if (path[0].endsWith(".html")) file = path[0]; else repo = path[0]; }
    const fileKey = repo + "/" + decodeURIComponent(file);
    let isPinned = false;
    try { const dbStr = localStorage.getItem("cms_repo_data"); if(dbStr){ const db = JSON.parse(dbStr); if(Array.isArray(db.pinnedDataCache) && db.pinnedDataCache.includes(fileKey)) isPinned = true; } } catch(e){}
    const btn = document.createElement("a");
    btn.href = "https://vietndj.github.io/?" + (isPinned ? "unpin=" : "pin=") + encodeURIComponent(fileKey);
    btn.innerHTML = isPinned ? "❌ Bỏ ghim" : "📌 Ghim bài";
    btn.style.cssText = "position:fixed;top:15px;right:15px;background:" + (isPinned ? "#FF3B30" : "#FF9500") + ";color:white;padding:8px 16px;border-radius:20px;font-weight:bold;font-size:12px;z-index:99999;text-decoration:none;box-shadow:0 4px 10px rgba(0,0,0,0.15);transition:all 0.2s ease;cursor:pointer;";
    btn.onmouseover = () => btn.style.transform = "scale(1.05)";
    btn.onmouseout = () => btn.style.transform = "scale(1)";
    btn.onclick = function(e) {
      e.preventDefault();
      window.open(this.href, "_blank");
      isPinned = !isPinned;
      this.innerHTML = isPinned ? "❌ Bỏ ghim" : "📌 Ghim bài";
      this.style.background = isPinned ? "#FF3B30" : "#FF9500";
      this.href = "https://vietndj.github.io/?" + (isPinned ? "unpin=" : "pin=") + encodeURIComponent(fileKey);
    };
    document.body.appendChild(btn);
  }
</script>

</body>
</html>
